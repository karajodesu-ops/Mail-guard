[build]
builder = "dockerfile"

[[services]]
name = "api"
source = "apps/api"
dockerfilePath = "apps/api/Dockerfile"

[services.deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 10


[[services]]
name = "worker"
source = "apps/worker"
dockerfilePath = "apps/worker/Dockerfile"

[services.deploy]
startCommand = "node dist/index.js"


[[services]]
name = "bot"
source = "apps/bot"
dockerfilePath = "apps/bot/Dockerfile"

[services.deploy]
startCommand = "node dist/index.js"
